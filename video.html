<!DOCTYPE html>
<html lang="es">
<head>

        header .menu {

            padding: 10px 0 20px 0;
        }

        #principal {

            flex-direction: column;
            min-height: 100vh;
        }

        section {
            flex: 1;
        }

</head>

<body>
    <div id="container">
        <div id="principal">

            <header>
                <nav class="menu">
